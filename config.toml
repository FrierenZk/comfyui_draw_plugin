# comfui_draw_plugin - 配置文件
# 通过 MCP 连接 ComfyUI，使用麦麦工作流生成图片。

[plugin]
config_version = "1.1.1"
# 触发命令名（修改后需重启插件）
command_name = "生图"
# 切换工作流命令名（修改后需重启插件）
switch_workflow_command = "切换工作流"
# 列出工作流命令名（修改后需重启插件）
list_workflow_command = "工作流列表"
# 是否启用插件
enabled = true
# 是否启用调试日志
debug_log = false

[comfyui]
# ComfyUI 服务地址
host = "127.0.0.1"
# ComfyUI 服务端口
port = 8188
# 生图超时秒数
generation_timeout = 300
# 默认工作流文件名
workflow_file = "麦麦工作流.json"
# 备选工作流（默认失败时逐一尝试）
optional_workflows = []

[llm]
# 模型标识符（Anthropic 直连时自动作为 model ID）
model_name = "deepseek-v4-pro"
# LLM 温度；常用 0.2~1.0，越高越发散。Stage1/3 固定使用 0.1/0.15
temperature = 0.3
# Stage1 角色名提取最大 token
max_tokens_char_extract = 2000
# Stage2 场景构图/人物特征最大 token
max_tokens_scene = 5000
# Stage3 角色细节补充最大 token
max_tokens_char_detail = 5000
# ---- Anthropic SDK 直连 ----
use_anthropic_api = false
anthropic_api_key = ""
anthropic_base_url = "https://api.deepseek.com/anthropic"
anthropic_env = []
